name: xshop
description: "XShop is a modern cross-platform fashion e-commerce application built with Flutter for Android, iOS, and Web, powered by Medusa.js as a headless commerce backend."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  device_preview: ^1.3.1
  flutter:
    sdk: flutter
  flutter_form_builder: ^10.3.0+2
  flutter_markdown_plus: ^1.0.12
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.3.0
  form_builder_validators: ^11.3.0
  go_router: ^17.3.0
  lucide_icons_flutter: ^3.1.15
  pinput: ^6.0.2
  string_validator: ^1.2.0
  styled_text: ^8.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/brand/
    - assets/images/icons/
    - assets/images/onboarding/
    - assets/licenses/
  fonts:
    - family: GeneralSans
      fonts:
        - asset: assets/fonts/general_sans/Fonts/TTF/GeneralSans-Variable.ttf
        - asset: assets/fonts/general_sans/Fonts/TTF/GeneralSans-VariableItalic.ttf
          style: italic
